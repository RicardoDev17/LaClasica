<ion-header>
  <ion-toolbar>
    <ion-title>Agendar Tarea</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form #taskForm="ngForm" (ngSubmit)="addTask(taskForm)">
    <ion-item>
      <ion-label position="floating">Título de la Tarea<br><br><br><br></ion-label>
      <ion-input
        type="text"
        [(ngModel)]="taskTitle"
        name="taskTitle"
        required
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Descripción<br><br><br><br></ion-label>
      <ion-input
        type="text"
        [(ngModel)]="taskDescription"
        name="taskDescription"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Fecha de Caducación<br><br><br><br></ion-label>
      <ion-datetime
        [(ngModel)]="dueDate"
        name="dueDate"
        required
      ></ion-datetime>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Hora de Alarma<br><br><br><br></ion-label>
      <ion-datetime
        [(ngModel)]="alarmTime"
        name="alarmTime"
        displayFormat="h:mm A"
        pickerFormat="h:mm A"
        required
      ></ion-datetime>
    </ion-item>

    <ion-button expand="full" type="submit" [disabled]="taskForm.invalid" (click)="goToTaskList()">
      Agendar Tarea
    </ion-button>

    <ion-button expand="full" color="light" (click)="goToTaskList()" style="margin-top: 10px;">
      Ver mis tareas
    </ion-button>
  
  </form>
</ion-content>
